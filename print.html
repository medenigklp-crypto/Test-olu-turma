<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Test Yazdır</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #555; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1a7fa8; color: #fff;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px;
    }
    #btn-back {
      background: rgba(255,255,255,0.25); color: #fff;
      border: none; border-radius: 20px; padding: 8px 16px;
      font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    #info {
      flex: 1; font-size: 13px; text-align: center; opacity: .9;
    }
    .spacer { height: calc(60px + env(safe-area-inset-top)); }
    /* iframe tam sayfa yüksekliğinde, scroll ile */
    #print-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 60px - env(safe-area-inset-top));
      border: none;
      background: #fff;
    }
    @media print {
      #toolbar { display: none !important; }
      .spacer { display: none !important; }
      #print-frame {
        height: 100vh;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-back" onclick="history.back()">← Geri</button>
    <div id="info">⬆️ Paylaş → <b>PDF Olarak Kaydet</b></div>
  </div>
  <div class="spacer"></div>
  <iframe id="print-frame"></iframe>

  <script>
    const html = localStorage.getItem('printHtml');
    const ifr = document.getElementById('print-frame');
    if(html){
      // Görselleri yüklemek için srcdoc kullan
      ifr.srcdoc = html;
      // iframe yüklendikten sonra yüksekliği içeriğe göre ayarla
      ifr.onload = function(){
        try {
          const h = ifr.contentDocument.documentElement.scrollHeight;
          ifr.style.height = Math.max(h, window.innerHeight) + 'px';
        } catch(e) {}
      };
    } else {
      document.body.innerHTML += '<div style="padding:40px;text-align:center;color:#fff;font-size:16px;">⚠️ İçerik bulunamadı. Geri dönüp tekrar deneyin.</div>';
    }
  </script>
</body>
</html>
