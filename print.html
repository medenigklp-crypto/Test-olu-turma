<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Test Yazdır</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:sans-serif;background:#f0f4f8;}
    #toolbar{
      background:#1a7fa8;color:#fff;
      padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));
      display:flex;align-items:center;gap:10px;
    }
    #btn-back{background:rgba(255,255,255,.25);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;}
    #info{flex:1;font-size:13px;text-align:center;line-height:1.4;}
    #wrap{background:#fff;margin:12px;border-radius:8px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.1);}
    /* Soru kutuları */
    .q-box{border:1px solid #ccc;border-radius:4px;padding:8px;background:#fafafa;margin-bottom:10px;page-break-inside:avoid;break-inside:avoid;}
    .q-box img{width:100%;display:block;border-radius:2px;}
    .q-num{font-weight:700;font-size:11pt;margin-bottom:5px;}
    /* Başlık stilleri */
    .hdr{border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px;}
    .badge{background:#1a7fa8;color:#fff;border-radius:4px;padding:2px 10px;font-size:11pt;font-weight:700;}
    table{width:100%;border-collapse:collapse;margin:6px 0;font-size:10pt;}
    table td{border:1px solid #000;padding:4px 8px;}
    .note{font-size:9pt;font-style:italic;margin:4px 0 8px;}
    @media print{
      body{background:#fff;}
      #toolbar{display:none!important;}
      #wrap{margin:0;box-shadow:none;border-radius:0;}
      .q-box{page-break-inside:avoid!important;break-inside:avoid!important;}
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-back" onclick="history.back()">← Geri</button>
    <div id="info">⬆️ Paylaş → <b>PDF Olarak Kaydet</b> seç</div>
  </div>
  <div id="wrap">Yükleniyor...</div>

  <script>
    const stored = localStorage.getItem('printHtml');
    const wrap = document.getElementById('wrap');

    if(!stored){
      wrap.innerHTML = '<p style="color:#888;text-align:center;padding:40px;">⚠️ İçerik bulunamadı. Geri dönüp tekrar deneyin.</p>';
    } else {
      const parser = new DOMParser();
      const doc = parser.parseFromString(stored, 'text/html');
      
      // Tüm img'leri bul ve src'yi koru
      const imgs = doc.querySelectorAll('img');
      imgs.forEach(img => {
        // base64 src'yi koru
        img.style.maxWidth = '100%';
      });
      
      // .page div'ini al
      const page = doc.querySelector('.page');
      if(page){
        wrap.innerHTML = page.innerHTML;
      } else {
        // Yoksa body'nin tamamını al
        wrap.innerHTML = doc.body.innerHTML;
      }
      
      // Sonradan eklenen img'lerin src'sini kontrol et
      const newImgs = wrap.querySelectorAll('img');
      newImgs.forEach(img => {
        img.style.maxWidth = '100%';
        img.style.display = 'block';
      });
    }
  </script>
</body>
</html>
