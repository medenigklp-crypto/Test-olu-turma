<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Test Yazdır</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f0f4f8; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1a7fa8; color: #fff;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px;
    }
    #toolbar button {
      border: none; border-radius: 20px; padding: 8px 18px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    #btn-back { background: rgba(255,255,255,0.25); color: #fff; }
    #btn-print { background: #fff; color: #1a7fa8; flex: 1; }
    #info {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 10px; margin: 80px 16px 12px; padding: 12px 14px;
      font-size: 13px; color: #856404; line-height: 1.6;
    }
    #info b { display: block; margin-bottom: 4px; font-size: 14px; }
    #content-wrap {
      margin: 0 8px 20px; border-radius: 8px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    iframe { width: 100%; height: 80vh; border: none; display: block; }
    @media print {
      #toolbar, #info { display: none !important; }
      #content-wrap { margin: 0; box-shadow: none; }
      iframe { height: 100vh; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-back" onclick="history.back()">← Geri</button>
    <button id="btn-print" onclick="document.getElementById('preview').contentWindow.print()">🖨️ Yazdır / PDF Kaydet</button>
  </div>

  <div id="info">
    <b>📄 PDF Olarak Kaydetmek için:</b>
    Safari'nin alt çubuğundaki <b>⬆️ Paylaş</b> butonuna bas → <b>"PDF Olarak Kaydet"</b> seç
  </div>

  <div id="content-wrap">
    <iframe id="preview"></iframe>
  </div>

  <script>
    // sessionStorage'dan HTML al
    const html = sessionStorage.getItem('printHtml');
    if(html){
      document.getElementById('preview').srcdoc = html;
    } else {
      document.getElementById('info').innerHTML = '<b>⚠️ İçerik bulunamadı.</b> Lütfen geri dönüp tekrar deneyin.';
    }
  </script>
</body>
</html>
