<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a7fa8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TestApp" />
  <meta name="description" content="PDF ve görsellerden A4 sınav kağıdı oluşturun" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

  <title>Test Oluşturucu</title>

  <!-- React & Babel (CDN) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #e8f4f8, #d0eaf5);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    /* iOS safe area */
    .safe-top    { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* Install banner */
    #install-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: #fff; border-top: 1px solid #ddd;
      padding: 12px 16px 24px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    #install-banner .banner-inner {
      max-width: 500px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    #install-banner img { width: 48px; height: 48px; border-radius: 12px; }
    #install-banner .banner-text { flex: 1; }
    #install-banner .banner-text strong { display: block; font-size: 15px; }
    #install-banner .banner-text span { font-size: 12px; color: #666; }
    #install-banner .btn-install {
      background: #1a7fa8; color: #fff; border: none; border-radius: 8px;
      padding: 10px 18px; font-weight: 700; cursor: pointer; font-size: 14px;
    }
    #install-banner .btn-dismiss {
      background: none; border: none; color: #999; cursor: pointer; font-size: 20px; padding: 4px;
    }

    /* Offline toast */
    #offline-toast {
      display: none; position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 13px; z-index: 9998; white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- Offline indicator -->
  <div id="offline-toast">📡 Çevrimdışı mod</div>

  <!-- PWA Install banner -->
  <div id="install-banner">
    <div class="banner-inner">
      <img src="icon-192.png" alt="icon" />
      <div class="banner-text">
        <strong>Test Oluşturucu</strong>
        <span>Ana ekrana ekle, her zaman hızlı aç</span>
      </div>
      <button class="btn-install" id="btn-install">Ekle</button>
      <button class="btn-dismiss" id="btn-dismiss">✕</button>
    </div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;
    const STEPS = { UPLOAD:'upload', SELECT:'select', SETTINGS:'settings', PREVIEW:'preview' };

    const toBase64 = (file) => new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = () => rej(new Error('Dosya okunamadı'));
      r.readAsDataURL(file);
    });

    function App() {
      const [step, setStep]   = useState(STEPS.UPLOAD);
      const [files, setFiles] = useState([]);
      const [previews, setPreviews] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [selected, setSelected]   = useState([]);
      const [loading, setLoading]     = useState(false);
      const [loadMsg, setLoadMsg]     = useState('');
      const [printHtml, setPrintHtml] = useState('');
      const [settings, setSettings]   = useState({
        testTitle:'', schoolName:'', teacherName:'',
        className:'', date: new Date().toLocaleDateString('tr-TR'),
        pointPerQ:'', columns:2, showAnswerKey:false
      });
      const fileRef = useRef();

      const addFiles = useCallback((incoming) => {
        const valid = Array.from(incoming).filter(f=>f.type.startsWith('image/')||f.type==='application/pdf');
        if (!valid.length) return;
        setFiles(p=>[...p,...valid]);
        valid.forEach(f=>{
          const url = URL.createObjectURL(f);
          setPreviews(p=>[...p,{name:f.name, url, type:f.type}]);
        });
      },[]);

      const onDrop = e => { e.preventDefault(); addFiles(e.dataTransfer.files); };

      const analyze = async () => {
        setLoading(true);
        const all = [];
        try {
          for (let i=0;i<files.length;i++) {
            const f = files[i];
            if (!f.type.startsWith('image/')) continue;
            setLoadMsg(`${i+1}/${files.length}: ${f.name}`);
            const b64 = await toBase64(f);
            const res = await fetch('https://api.anthropic.com/v1/messages',{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({
                model:'claude-sonnet-4-6', max_tokens:1000,
                messages:[{role:'user', content:[
                  {type:'image', source:{type:'base64', media_type:f.type, data:b64}},
                  {type:'text', text:`Bu görseldeki soruları JSON olarak döndür. Format: {"questions":[{id,text,options,hasImage,answer}]}. SADECE JSON, başka hiçbir şey yazma.`}
                ]}]
              })
            });
            const data = await res.json();
            const txt = (data.content||[]).map(c=>c.text||'').join('');
            try {
              const parsed = JSON.parse(txt.replace(/```json|```/g,'').trim());
              (parsed.questions||[]).forEach((q,j)=>all.push({...q, id:`f${i}_q${j}`, source:f.name}));
            } catch(_) {}
          }
          setQuestions(all);
          setSelected(all.map(q=>q.id));
          setStep(STEPS.SELECT);
        } catch(e) { alert('Hata: '+e.message); }
        finally { setLoading(false); }
      };

      const toggle = id => setSelected(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

      const buildTest = () => {
        const chosen = questions.filter(q=>selected.includes(q.id));
        const ppq = settings.pointPerQ || Math.floor(100/(chosen.length||1));
        const qHtml = chosen.map((q,i)=>`
          <div class="question ${settings.columns===2?'col-half':'col-full'}">
            <div class="q-head"><b>${i+1}.</b> ${q.text||''}</div>
            ${q.options?`<div class="opts">${q.options.map(o=>`<div>${o}</div>`).join('')}</div>`:''}
            ${q.hasImage?`<div class="img-box">[Görsel]</div>`:''}
            <div class="q-pt">${ppq} puan</div>
          </div>`).join('');
        const ak = settings.showAnswerKey ? `<div style="margin-top:20px;border-top:2px solid #000;padding-top:12px;page-break-before:always">
          <h3 style="text-align:center;margin-bottom:8px">CEVAP ANAHTARI</h3>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${chosen.map((q,i)=>`<span style="min-width:50px;font-weight:700">${i+1}. ${q.answer||'—'}</span>`).join('')}
          </div></div>` : '';
        setPrintHtml(`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"/>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Times New Roman',serif;font-size:11pt;color:#111}
.page{width:210mm;min-height:297mm;margin:0 auto;padding:14mm 18mm}
.header{text-align:center;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:10px}
.school{font-size:13pt;font-weight:700}.title{font-size:12pt;margin:4px 0}
.info-t{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}
.info-t td{border:1px solid #000;padding:4px 8px}.info-t .lb{font-weight:700;width:80px}
.note{font-size:9.5pt;font-style:italic;margin:6px 0 10px}
.wrap{display:flex;flex-wrap:wrap;gap:8px}
.col-half{width:calc(50% - 4px)}.col-full{width:100%}
.question{border:1px solid #ccc;border-radius:4px;padding:8px;page-break-inside:avoid;position:relative;background:#fafafa}
.q-head{line-height:1.5;padding-right:50px}.opts{margin:6px 0 0 18px;font-size:10.5pt}
.opts div{margin:2px 0}.img-box{border:1px dashed #999;height:50px;display:flex;align-items:center;justify-content:center;color:#999;font-size:9pt;margin:6px 0}
.q-pt{position:absolute;top:4px;right:6px;font-size:8pt;color:#888}
.sig{margin-top:20px;text-align:right;font-size:10pt}
@media print{body{background:#fff}.page{padding:10mm 15mm}}
</style></head><body><div class="page">
<div class="header">
${settings.schoolName?`<div class="school">${settings.schoolName}</div>`:''}
<div class="title">${settings.testTitle||'SINAV KAĞIDI'}</div>
<div style="font-size:10pt">${settings.date}</div>
</div>
<table class="info-t"><tr>
<td class="lb">AD SOYAD</td><td></td>
<td class="lb">SINIF / NO</td><td>${settings.className||''}</td>
<td class="lb">PUAN</td><td></td>
</tr></table>
<div class="note">Not: Her soru ${ppq} puandır. Toplam ${chosen.length} soru.</div>
<div class="wrap">${qHtml}</div>
${settings.teacherName?`<div class="sig">${settings.teacherName}</div>`:''}
${ak}</div></body></html>`);
        setStep(STEPS.PREVIEW);
      };

      const doPrint = () => {
        const w = window.open('','_blank');
        w.document.write(printHtml);
        w.document.close();
        w.focus();
        setTimeout(()=>w.print(),500);
      };

      // ── RENDER ──────────────────────────────────────────
      const accent = '#1a7fa8';

      return (
        <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
          {/* HEADER */}
          <div style={{background:accent, color:'#fff', padding:'14px 20px', paddingTop:'calc(14px + env(safe-area-inset-top))', display:'flex', alignItems:'center', gap:12, position:'sticky', top:0, zIndex:100}}>
            <span style={{fontSize:26}}>📄</span>
            <div>
              <div style={{fontWeight:700, fontSize:17}}>Test Oluşturucu</div>
              <div style={{fontSize:11, opacity:.85}}>PDF & Görselden A4 Sınav Kağıdı</div>
            </div>
            <div style={{marginLeft:'auto', display:'flex', gap:6}}>
              {['Yükle','Seç','Ayarlar','Önizle'].map((lbl,i)=>{
                const idx = Object.values(STEPS).indexOf(step);
                const active = i===idx, done = i<idx;
                return (
                  <div key={lbl} style={{display:'flex', alignItems:'center', gap:4}}>
                    <div style={{width:26, height:26, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                      background: active?'#fff': done?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.25)',
                      color: active?accent:'#fff', fontWeight:700, fontSize:12}}>
                      {done?'✓':i+1}
                    </div>
                    <span style={{fontSize:11, display:'none'}}>{lbl}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* BODY */}
          <div style={{flex:1, padding:'20px 16px', maxWidth:860, margin:'0 auto', width:'100%'}}>

            {/* ── UPLOAD ── */}
            {step===STEPS.UPLOAD && (
              <div>
                <div onDrop={onDrop} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current.click()}
                  style={{border:`2px dashed ${accent}`, borderRadius:16, padding:'44px 20px', textAlign:'center', cursor:'pointer', background:'#fff'}}>
                  <div style={{fontSize:48}}>📎</div>
                  <div style={{fontSize:18, fontWeight:700, color:accent, marginTop:12}}>Dosya Yükle</div>
                  <div style={{color:'#666', marginTop:6}}>PDF veya görsel sürükle / tıkla</div>
                  <div style={{color:'#aaa', fontSize:12, marginTop:4}}>PNG · JPG · PDF</div>
                </div>
                <input ref={fileRef} type="file" multiple accept="image/*,application/pdf" style={{display:'none'}} onChange={e=>addFiles(e.target.files)} />

                {previews.length>0 && <>
                  <div style={{fontWeight:700, margin:'16px 0 10px', color:'#333'}}>Yüklenen ({previews.length})</div>
                  <div style={{display:'flex', flexWrap:'wrap', gap:10}}>
                    {previews.map((p,i)=>(
                      <div key={i} style={{width:110, borderRadius:10, overflow:'hidden', border:'1px solid #ddd', background:'#fff', boxShadow:'0 2px 6px rgba(0,0,0,.08)'}}>
                        {p.type.startsWith('image/')
                          ? <img src={p.url} alt={p.name} style={{width:'100%', height:80, objectFit:'cover'}} />
                          : <div style={{height:80, display:'flex', alignItems:'center', justifyContent:'center', fontSize:32}}>📄</div>}
                        <div style={{padding:'4px 6px', fontSize:10, color:'#555', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis'}}>{p.name}</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={analyze} disabled={loading} style={{marginTop:18, background:loading?'#aaa':accent, color:'#fff', border:'none', borderRadius:12, padding:'14px 28px', fontSize:16, fontWeight:700, cursor:loading?'not-allowed':'pointer', width:'100%'}}>
                    {loading ? `⏳ ${loadMsg}` : '🔍 Soruları Analiz Et'}
                  </button>
                </>}
              </div>
            )}

            {/* ── SELECT ── */}
            {step===STEPS.SELECT && (
              <div>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
                  <div>
                    <div style={{fontSize:19, fontWeight:700, color:accent}}>Soruları Seç</div>
                    <div style={{fontSize:12, color:'#666'}}>{selected.length}/{questions.length} seçildi</div>
                  </div>
                  <div style={{display:'flex', gap:8}}>
                    <button onClick={()=>setSelected(questions.map(q=>q.id))} style={{background:'#e8f4f8', border:'none', borderRadius:8, padding:'8px 12px', cursor:'pointer', fontWeight:600, color:accent, fontSize:13}}>Tümü</button>
                    <button onClick={()=>setSelected([])} style={{background:'#fee', border:'none', borderRadius:8, padding:'8px 12px', cursor:'pointer', fontWeight:600, color:'#c00', fontSize:13}}>Temizle</button>
                  </div>
                </div>

                {questions.length===0
                  ? <div style={{textAlign:'center', padding:40, background:'#fff', borderRadius:12, color:'#888'}}>
                      <div style={{fontSize:40}}>🔍</div>
                      <div style={{marginTop:10}}>Soru bulunamadı. Farklı görsel deneyin.</div>
                      <button onClick={()=>setStep(STEPS.UPLOAD)} style={{marginTop:16, background:accent, color:'#fff', border:'none', borderRadius:8, padding:'10px 20px', cursor:'pointer'}}>← Geri</button>
                    </div>
                  : <div style={{display:'flex', flexDirection:'column', gap:10}}>
                      {questions.map((q,idx)=>{
                        const sel = selected.includes(q.id);
                        return (
                          <div key={q.id} onClick={()=>toggle(q.id)} style={{background:sel?'#e8f7ff':'#fff', border:`2px solid ${sel?accent:'#e0e0e0'}`, borderRadius:10, padding:'12px 14px', cursor:'pointer', display:'flex', gap:12, alignItems:'flex-start', transition:'all .15s'}}>
                            <div style={{width:22, height:22, borderRadius:6, border:`2px solid ${sel?accent:'#ccc'}`, background:sel?accent:'#fff', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', flexShrink:0, fontSize:13}}>
                              {sel?'✓':''}
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:600, color:'#333', marginBottom:3, fontSize:13}}>Soru {idx+1}</div>
                              <div style={{fontSize:12, color:'#555', lineHeight:1.5}}>{(q.text||'').slice(0,200)}{(q.text||'').length>200?'...':''}</div>
                              {q.options && <div style={{marginTop:5, display:'flex', flexWrap:'wrap', gap:4}}>
                                {q.options.map((o,oi)=><span key={oi} style={{background:'#f0f0f0', borderRadius:4, padding:'2px 7px', fontSize:11}}>{o}</span>)}
                              </div>}
                              <div style={{fontSize:10, color:'#bbb', marginTop:4}}>{q.source}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                }

                {selected.length>0 && (
                  <button onClick={()=>setStep(STEPS.SETTINGS)} style={{marginTop:18, background:accent, color:'#fff', border:'none', borderRadius:12, padding:'14px 28px', fontSize:16, fontWeight:700, cursor:'pointer', width:'100%'}}>
                    Devam ({selected.length} soru) →
                  </button>
                )}
              </div>
            )}

            {/* ── SETTINGS ── */}
            {step===STEPS.SETTINGS && (
              <div style={{background:'#fff', borderRadius:16, padding:20}}>
                <div style={{fontSize:19, fontWeight:700, color:accent, marginBottom:18}}>Test Ayarları</div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                  {[
                    ['testTitle','Test Başlığı','Fen Bilimleri 1. Dönem Sınavı'],
                    ['schoolName','Okul Adı','...Ortaokulu / Lisesi'],
                    ['teacherName','Öğretmen','Ad Soyad'],
                    ['className','Sınıf / Şube','9-A'],
                    ['date','Tarih',''],
                    ['pointPerQ','Soru Puanı','Boş = otomatik'],
                  ].map(([k,lbl,ph])=>(
                    <div key={k}>
                      <label style={{fontSize:12, fontWeight:600, color:'#555', display:'block', marginBottom:4}}>{lbl}</label>
                      <input value={settings[k]} onChange={e=>setSettings(p=>({...p,[k]:e.target.value}))} placeholder={ph}
                        style={{width:'100%', padding:'9px 11px', borderRadius:8, border:'1px solid #ddd', fontSize:13, outline:'none'}} />
                    </div>
                  ))}
                  <div>
                    <label style={{fontSize:12, fontWeight:600, color:'#555', display:'block', marginBottom:4}}>Sütun Sayısı</label>
                    <select value={settings.columns} onChange={e=>setSettings(p=>({...p,columns:+e.target.value}))}
                      style={{width:'100%', padding:'9px 11px', borderRadius:8, border:'1px solid #ddd', fontSize:13}}>
                      <option value={1}>1 Sütun</option>
                      <option value={2}>2 Sütun</option>
                    </select>
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:8, paddingTop:18}}>
                    <input type="checkbox" id="ak" checked={settings.showAnswerKey} onChange={e=>setSettings(p=>({...p,showAnswerKey:e.target.checked}))} style={{width:18, height:18}} />
                    <label htmlFor="ak" style={{fontSize:13, fontWeight:600, color:'#555', cursor:'pointer'}}>Cevap Anahtarı</label>
                  </div>
                </div>
                <div style={{display:'flex', gap:10, marginTop:20}}>
                  <button onClick={()=>setStep(STEPS.SELECT)} style={{background:'#f0f0f0', border:'none', borderRadius:10, padding:'12px 18px', fontSize:14, fontWeight:600, cursor:'pointer', flex:1}}>← Geri</button>
                  <button onClick={buildTest} style={{background:accent, color:'#fff', border:'none', borderRadius:10, padding:'12px 18px', fontSize:14, fontWeight:700, cursor:'pointer', flex:2}}>Test Oluştur →</button>
                </div>
              </div>
            )}

            {/* ── PREVIEW ── */}
            {step===STEPS.PREVIEW && (
              <div>
                <div style={{display:'flex', gap:10, marginBottom:14, flexWrap:'wrap'}}>
                  <button onClick={()=>setStep(STEPS.SETTINGS)} style={{background:'#f0f0f0', border:'none', borderRadius:10, padding:'11px 16px', fontWeight:600, cursor:'pointer'}}>← Geri</button>
                  <button onClick={doPrint} style={{background:accent, color:'#fff', border:'none', borderRadius:10, padding:'11px 22px', fontWeight:700, cursor:'pointer', fontSize:14, flex:1}}>🖨️ Yazdır / PDF Kaydet</button>
                  <button onClick={()=>{setStep(STEPS.UPLOAD);setFiles([]);setPreviews([]);setQuestions([]);setSelected([]);}}
                    style={{background:'#e8f7ff', border:'none', borderRadius:10, padding:'11px 14px', fontWeight:600, cursor:'pointer', color:accent}}>🔄 Yeni</button>
                </div>
                <div style={{background:'#444', borderRadius:12, padding:12}}>
                  <iframe srcDoc={printHtml} style={{width:'100%', height:'78vh', border:'none', borderRadius:6}} title="Önizleme" />
                </div>
              </div>
            )}
          </div>

          {/* Safe area bottom spacer */}
          <div style={{height:'env(safe-area-inset-bottom)'}} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- PWA: Service Worker + Install Prompt -->
  <script>
    // Register SW
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered', reg.scope))
          .catch(err => console.warn('SW failed', err));
      });
    }

    // Offline/online indicator
    const offlineToast = document.getElementById('offline-toast');
    function updateOnlineStatus() {
      offlineToast.style.display = navigator.onLine ? 'none' : 'block';
    }
    window.addEventListener('online',  updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Install prompt (Android/Chrome)
    let deferredPrompt;
    const banner   = document.getElementById('install-banner');
    const btnInst  = document.getElementById('btn-install');
    const btnDism  = document.getElementById('btn-dismiss');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.style.display = 'block';
    });

    btnInst.addEventListener('click', async () => {
      banner.style.display = 'none';
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('Install outcome:', outcome);
        deferredPrompt = null;
      }
    });

    btnDism.addEventListener('click', () => {
      banner.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      banner.style.display = 'none';
      deferredPrompt = null;
      console.log('PWA installed!');
    });
  </script>
</body>
</html>
