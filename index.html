<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a7fa8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TestApp" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Test Oluşturucu</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

    /* HEADER */
    #header {
      background: #1a7fa8; color: #fff;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 200;
    }
    #header h1 { font-size: 17px; font-weight: 700; }
    #header p  { font-size: 11px; opacity: .8; }
    #btn-upload-top {
      margin-left: auto; background: #fff; color: #1a7fa8;
      border: none; border-radius: 20px; padding: 7px 16px;
      font-weight: 700; font-size: 13px; cursor: pointer;
    }

    /* SCREENS */
    .screen { display: none; }
    .screen.active { display: block; }

    /* UPLOAD SCREEN */
    #upload-screen { padding: 24px 16px; }
    #drop-zone {
      border: 2px dashed #1a7fa8; border-radius: 16px;
      padding: 52px 20px; text-align: center; background: #fff;
      cursor: pointer;
    }
    #drop-zone .icon { font-size: 52px; }
    #drop-zone h2 { font-size: 18px; font-weight: 700; color: #1a7fa8; margin: 10px 0 4px; }
    #drop-zone p  { color: #888; font-size: 13px; }

    /* VIEWER SCREEN */
    #viewer-screen { display: none; flex-direction: column; height: calc(100vh - 56px); }
    #viewer-screen.active { display: flex; }

    #viewer-toolbar {
      background: #fff; border-bottom: 1px solid #e0e0e0;
      padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    #viewer-toolbar .page-info { font-size: 13px; color: #555; flex: 1; text-align: center; }
    #viewer-toolbar button {
      background: #e8f4f8; border: none; border-radius: 8px;
      padding: 7px 12px; cursor: pointer; font-size: 13px; font-weight: 600; color: #1a7fa8;
    }
    #viewer-toolbar button.active-mode { background: #1a7fa8; color: #fff; }
    #viewer-toolbar button:disabled { opacity: .4; cursor: default; }

    #canvas-wrap {
      flex: 1; overflow: auto; position: relative;
      background: #888; display: flex; justify-content: center; align-items: flex-start;
      padding: 12px;
    }
    #canvas-container {
      position: relative; display: inline-block;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    #pdf-canvas { display: block; }
    #select-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair; touch-action: none;
    }

    /* SELECTION overlay */
    #sel-box {
      position: absolute; border: 2px solid #1a7fa8;
      background: rgba(26,127,168,.15);
      pointer-events: none; display: none;
    }

    /* SELECTED QUESTIONS panel */
    #questions-bar {
      background: #fff; border-top: 2px solid #1a7fa8;
      padding: 8px 12px; max-height: 180px; overflow-y: auto;
    }
    #questions-bar h3 { font-size: 13px; font-weight: 700; color: #1a7fa8; margin-bottom: 6px; }
    #q-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .q-thumb {
      position: relative; border: 2px solid #1a7fa8; border-radius: 6px;
      overflow: hidden; cursor: pointer;
    }
    .q-thumb img { display: block; height: 70px; width: auto; }
    .q-thumb .del {
      position: absolute; top: 2px; right: 2px;
      background: rgba(200,0,0,.8); color: #fff; border: none;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #q-empty { color: #aaa; font-size: 12px; font-style: italic; }

    /* SETTINGS SCREEN */
    #settings-screen { padding: 16px; }
    #settings-screen h2 { font-size: 18px; font-weight: 700; color: #1a7fa8; margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
    .field input, .field select {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .check-row input { width: 18px; height: 18px; }
    .check-row label { font-size: 14px; font-weight: 600; color: #555; }
    #btn-generate {
      width: 100%; background: #1a7fa8; color: #fff; border: none;
      border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px;
    }
    #btn-back-settings {
      width: 100%; background: #f0f0f0; border: none;
      border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-bottom: 10px;
    }

    /* PREVIEW SCREEN */
    #preview-screen { padding: 16px; }
    #preview-screen h2 { font-size: 18px; font-weight: 700; color: #1a7fa8; margin-bottom: 12px; }
    #preview-actions { display: flex; gap: 10px; margin-bottom: 12px; }
    #preview-actions button {
      flex: 1; border: none; border-radius: 10px; padding: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    #btn-print { background: #1a7fa8; color: #fff; }
    #btn-back-preview { background: #f0f0f0; color: #333; }
    #btn-new { background: #e8f7ff; color: #1a7fa8; }
    #preview-frame { width: 100%; height: 70vh; border: none; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.15); }

    /* FAB */
    #fab {
      position: fixed; bottom: calc(16px + env(safe-area-inset-bottom));
      right: 16px; z-index: 300;
      background: #1a7fa8; color: #fff; border: none;
      border-radius: 28px; padding: 14px 20px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,127,168,.5);
      display: none;
    }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>📄 Test Oluşturucu</h1>
    <p>PDF'den alan seç → A4 test oluştur</p>
  </div>
  <button id="btn-upload-top" onclick="showUpload()">+ PDF Yükle</button>
</div>

<!-- UPLOAD -->
<div id="upload-screen" class="screen active">
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📎</div>
    <h2>PDF Yükle</h2>
    <p>Tıkla veya sürükle bırak</p>
    <p style="margin-top:6px;font-size:12px;color:#bbb">PDF dosyası</p>
  </div>
  <input id="file-input" type="file" accept="application/pdf" style="display:none" onchange="loadPDF(this)"/>
</div>

<!-- VIEWER -->
<div id="viewer-screen" class="screen">
  <div id="viewer-toolbar">
    <button id="btn-prev" onclick="changePage(-1)">◀</button>
    <span class="page-info" id="page-info">Sayfa 1 / 1</span>
    <button id="btn-next" onclick="changePage(1)">▶</button>
    <button id="btn-mode" class="active-mode" onclick="toggleMode()">✂️ Seç</button>
    <button onclick="goSettings()" id="btn-go-settings" disabled>⚙️ Devam (<span id="q-count">0</span>)</button>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="select-canvas"></canvas>
      <div id="sel-box"></div>
    </div>
  </div>

  <div id="questions-bar">
    <h3>Seçilen Sorular — <span id="q-count2">0</span> adet</h3>
    <div id="q-list"><span id="q-empty">Henüz soru seçilmedi. PDF üzerinde kare çizin.</span></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-screen" class="screen">
  <button id="btn-back-settings" onclick="showViewer()">← Geri</button>
  <h2>Test Ayarları</h2>
  <div class="field-row">
    <div class="field"><label>Okul Adı</label><input id="f-school" placeholder="...Ortaokulu"/></div>
    <div class="field"><label>Sınıf / Şube</label><input id="f-class" placeholder="9-A"/></div>
  </div>
  <div class="field"><label>Test Başlığı</label><input id="f-title" placeholder="1. Dönem Sınavı"/></div>
  <div class="field-row">
    <div class="field"><label>Öğretmen</label><input id="f-teacher" placeholder="Ad Soyad"/></div>
    <div class="field"><label>Tarih</label><input id="f-date" /></div>
  </div>
  <div class="field-row">
    <div class="field"><label>Sütun Sayısı</label>
      <select id="f-cols"><option value="1">1 Sütun</option><option value="2" selected>2 Sütun</option></select>
    </div>
    <div class="field"><label>Soru Puanı</label><input id="f-point" placeholder="Otomatik" type="number"/></div>
  </div>
  <div class="check-row">
    <input type="checkbox" id="f-anskey"/>
    <label for="f-anskey">Cevap anahtarı sayfası ekle</label>
  </div>
  <button id="btn-generate" onclick="generateTest()">📄 Testi Oluştur</button>
</div>

<!-- PREVIEW -->
<div id="preview-screen" class="screen">
  <h2>Test Önizleme</h2>
  <div id="preview-actions">
    <button id="btn-back-preview" onclick="showSettings()">← Geri</button>
    <button id="btn-print" onclick="doPrint()">🖨️ Yazdır</button>
    <button id="btn-new" onclick="startNew()">🔄 Yeni</button>
  </div>
  <iframe id="preview-frame"></iframe>
</div>

<button id="fab" onclick="goSettings()">⚙️ Test Oluştur (<span id="fab-count">0</span>)</button>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, currentPage = 1, totalPages = 0;
let selecting = false, startX = 0, startY = 0, curX = 0, curY = 0;
let isSelectMode = true;
let selectedQuestions = []; // {dataUrl, pageNum}

const pdfCanvas   = document.getElementById('pdf-canvas');
const selCanvas   = document.getElementById('select-canvas');
const selBox      = document.getElementById('sel-box');
const ctx         = pdfCanvas.getContext('2d');
const wrap        = document.getElementById('canvas-wrap');

// ── SCREENS ──────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('fab').style.display = (id === 'viewer-screen') ? 'flex' : 'none';
}
function showUpload()  { showScreen('upload-screen'); }
function showViewer()  { showScreen('viewer-screen'); }
function showSettings(){ showScreen('settings-screen'); }
function showPreview() { showScreen('preview-screen'); }

function goSettings() {
  if (selectedQuestions.length === 0) return;
  document.getElementById('f-date').value = new Date().toLocaleDateString('tr-TR');
  showSettings();
}

function startNew() {
  selectedQuestions = [];
  pdfDoc = null;
  updateQList();
  showUpload();
}

// ── PDF LOAD ─────────────────────────────────────────
async function loadPDF(input) {
  const file = input.files[0];
  if (!file) return;
  const ab = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;
  selectedQuestions = [];
  updateQList();
  showViewer();
  renderPage(currentPage);
}

async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const vp = page.getViewport({ scale: 1 });
  // Fit to container width
  const maxW = Math.min(window.innerWidth - 24, 800);
  const scale = maxW / vp.width;
  const viewport = page.getViewport({ scale });

  pdfCanvas.width  = viewport.width;
  pdfCanvas.height = viewport.height;
  selCanvas.width  = viewport.width;
  selCanvas.height = viewport.height;

  await page.render({ canvasContext: ctx, viewport }).promise;
  document.getElementById('page-info').textContent = `Sayfa ${num} / ${totalPages}`;
  document.getElementById('btn-prev').disabled = num <= 1;
  document.getElementById('btn-next').disabled = num >= totalPages;
}

function changePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  renderPage(currentPage);
}

// ── SELECT MODE ───────────────────────────────────────
function toggleMode() {
  isSelectMode = !isSelectMode;
  const btn = document.getElementById('btn-mode');
  btn.textContent = isSelectMode ? '✂️ Seç' : '🖐 Kaydır';
  btn.classList.toggle('active-mode', isSelectMode);
  selCanvas.style.cursor = isSelectMode ? 'crosshair' : 'default';
  wrap.style.overflowX = isSelectMode ? 'hidden' : 'auto';
}

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY
  };
}

function updateSelBox() {
  const rect = selCanvas.getBoundingClientRect();
  const scaleX = rect.width  / selCanvas.width;
  const scaleY = rect.height / selCanvas.height;
  const x = Math.min(startX, curX) * scaleX;
  const y = Math.min(startY, curY) * scaleY;
  const w = Math.abs(curX - startX) * scaleX;
  const h = Math.abs(curY - startY) * scaleY;
  const container = document.getElementById('canvas-container').getBoundingClientRect();
  selBox.style.display = 'block';
  selBox.style.left   = x + 'px';
  selBox.style.top    = y + 'px';
  selBox.style.width  = w + 'px';
  selBox.style.height = h + 'px';
}

selCanvas.addEventListener('mousedown',  onStart);
selCanvas.addEventListener('touchstart', onStart, { passive: false });
selCanvas.addEventListener('mousemove',  onMove);
selCanvas.addEventListener('touchmove',  onMove, { passive: false });
selCanvas.addEventListener('mouseup',    onEnd);
selCanvas.addEventListener('touchend',   onEnd);

function onStart(e) {
  if (!isSelectMode) return;
  e.preventDefault();
  selecting = true;
  const p = getPos(e, selCanvas);
  startX = curX = p.x;
  startY = curY = p.y;
  selBox.style.display = 'block';
}
function onMove(e) {
  if (!selecting || !isSelectMode) return;
  e.preventDefault();
  const p = getPos(e, selCanvas);
  curX = p.x; curY = p.y;
  updateSelBox();
}
function onEnd(e) {
  if (!selecting || !isSelectMode) return;
  e.preventDefault();
  selecting = false;
  selBox.style.display = 'none';

  const x = Math.min(startX, curX);
  const y = Math.min(startY, curY);
  const w = Math.abs(curX - startX);
  const h = Math.abs(curY - startY);
  if (w < 20 || h < 20) return; // too small

  // Crop from pdfCanvas
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').drawImage(pdfCanvas, x, y, w, h, 0, 0, w, h);
  const dataUrl = tmp.toDataURL('image/png');
  selectedQuestions.push({ dataUrl, pageNum: currentPage });
  updateQList();
}

// ── Q LIST ────────────────────────────────────────────
function updateQList() {
  const list = document.getElementById('q-list');
  const empty = document.getElementById('q-empty');
  const count = selectedQuestions.length;
  document.getElementById('q-count').textContent  = count;
  document.getElementById('q-count2').textContent = count;
  document.getElementById('fab-count').textContent = count;
  document.getElementById('btn-go-settings').disabled = count === 0;
  document.getElementById('fab').style.display = (count > 0 && document.getElementById('viewer-screen').classList.contains('active')) ? 'flex' : 'none';

  list.innerHTML = '';
  if (count === 0) { list.appendChild(document.getElementById('q-empty')); empty.style.display='inline'; return; }
  empty.style.display = 'none';

  selectedQuestions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-thumb';
    const img = document.createElement('img');
    img.src = q.dataUrl;
    const btn = document.createElement('button');
    btn.className = 'del';
    btn.textContent = '✕';
    btn.onclick = (e) => { e.stopPropagation(); selectedQuestions.splice(i,1); updateQList(); };
    div.appendChild(img);
    div.appendChild(btn);
    list.appendChild(div);
  });
}

// ── GENERATE TEST ─────────────────────────────────────
function generateTest() {
  const school  = document.getElementById('f-school').value;
  const cls     = document.getElementById('f-class').value;
  const title   = document.getElementById('f-title').value || 'SINAV KAĞIDI';
  const teacher = document.getElementById('f-teacher').value;
  const date    = document.getElementById('f-date').value;
  const cols    = parseInt(document.getElementById('f-cols').value);
  const point   = document.getElementById('f-point').value || Math.floor(100 / (selectedQuestions.length || 1));
  const ansKey  = document.getElementById('f-anskey').checked;

  const colW = cols === 2 ? '48%' : '100%';

  const qHtml = selectedQuestions.map((q, i) => `
    <div style="width:${colW};border:1px solid #ccc;border-radius:4px;padding:8px;page-break-inside:avoid;background:#fafafa;position:relative;">
      <div style="font-weight:700;font-size:10pt;margin-bottom:4px;">${i+1}. Soru <span style="position:absolute;top:6px;right:8px;font-size:8pt;color:#888;">${point} puan</span></div>
      <img src="${q.dataUrl}" style="width:100%;border-radius:2px;" />
    </div>`).join('');

  const html = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Times New Roman',serif;font-size:11pt;color:#111}
.page{width:210mm;min-height:297mm;margin:0 auto;padding:14mm 18mm}
.header{text-align:center;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:10px}
.school{font-size:13pt;font-weight:700}
.title{font-size:12pt;margin:4px 0}
.info-t{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}
.info-t td{border:1px solid #000;padding:4px 8px}
.info-t .lb{font-weight:700;width:80px}
.wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.sig{margin-top:20px;text-align:right;font-size:10pt}
.note{font-size:9.5pt;font-style:italic;margin:4px 0 6px}
@media print{body{background:#fff}.page{padding:10mm 15mm}}
</style></head><body><div class="page">
<div class="header">
${school?`<div class="school">${school}</div>`:''}
<div class="title">${title}</div>
<div style="font-size:10pt">${date}</div>
</div>
<table class="info-t"><tr>
<td class="lb">AD SOYAD</td><td></td>
<td class="lb">SINIF / NO</td><td>${cls}</td>
<td class="lb">PUAN</td><td></td>
</tr></table>
<div class="note">Not: Her soru ${point} puandır. Toplam ${selectedQuestions.length} soru.</div>
<div class="wrap">${qHtml}</div>
${teacher?`<div class="sig">${teacher}</div>`:''}
</div></body></html>`;

  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
  window._printHtml = html;
  showPreview();
}

function doPrint() {
  const w = window.open('', '_blank');
  w.document.write(window._printHtml);
  w.document.close();
  w.focus();
  setTimeout(() => w.print(), 500);
}

// ── SW ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
